<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>HH Crowd Live Radar</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" type="text/css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        .overlay {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(8, 8, 16, 0.92); color: white; padding: 16px;
            border-radius: 14px; border: 1px solid rgba(255,255,255,0.1);
            width: 290px; backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .overlay h3 { margin: 0 0 4px 0; font-size: 16px; letter-spacing: 0.5px; color: #e0e8ff; }
        .overlay .subtitle { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }

        #status-bar {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; margin-top: 10px; padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4b2b; flex-shrink: 0; transition: background 0.5s; }
        #status-dot.live { background: #33cc33; animation: pulse 2s infinite; }
        #status-dot.demo { background: #ff9800; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        #status-text { color: rgba(255,255,255,0.5); font-size: 11px; }

        .legend {
            position: absolute; bottom: 30px; right: 15px; z-index: 10;
            background: rgba(8, 8, 16, 0.88); color: white; padding: 14px 16px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            font-size: 11px; backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .legend-title { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .legend-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

        #info-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(8,8,16,0.95); color: white; padding: 20px;
            border-radius: 15px; width: 300px; display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
        }
        #info-panel .close-btn { position: absolute; top: 10px; right: 12px; cursor: pointer; color: rgba(255,255,255,0.4); font-size: 18px; }
        #info-panel .close-btn:hover { color: white; }
        #place-name { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        #load-value { font-size: 32px; font-weight: 700; margin: 4px 0; }
        #load-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
        .bar-track { height: 6px; width: 100%; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        #load-fill { height: 100%; width: 0%; border-radius: 3px; transition: width 1s ease, background 1s ease; }
        #load-time { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 8px; }

        .mapboxgl-ctrl-geocoder { width: 100% !important; max-width: none !important; background: rgba(255,255,255,0.06) !important; box-shadow: none !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 8px !important; }
        .mapboxgl-ctrl-geocoder input { color: white !important; background: transparent !important; }
        .mapboxgl-ctrl-geocoder--icon { fill: rgba(255,255,255,0.3) !important; }
        .mapboxgl-ctrl-geocoder--input::placeholder { color: rgba(255,255,255,0.3) !important; }
    </style>
</head>
<body>

<div class="overlay">
    <h3>🔴 Hamburg Crowd Radar</h3>
    <div class="subtitle">Passanten-Frequenz in Echtzeit</div>
    <div id="geocoder"></div>
    <div id="status-bar">
        <div id="status-dot"></div>
        <span id="status-text">Verbinde…</span>
    </div>
</div>

<div class="legend">
    <div class="legend-title">Passanten / Stunde</div>
    <div class="legend-row"><div class="legend-dot" style="background:#00d2ff"></div> &lt; 400 – Ruhig</div>
    <div class="legend-row"><div class="legend-dot" style="background:#33cc33"></div> 400–800 – Moderat</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ff9800"></div> 800–1500 – Belebt</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ff4b2b"></div> 1500–3000 – Voll</div>
    <div class="legend-row"><div class="legend-dot" style="background:#cc44ff"></div> &gt; 3000 – Sehr voll</div>
</div>

<div id="info-panel">
    <span class="close-btn" onclick="document.getElementById('info-panel').style.display='none'">×</span>
    <div id="place-name">Standort</div>
    <div id="load-value" style="color:#00d2ff">–</div>
    <div id="load-label">Passanten / Stunde</div>
    <div class="bar-track"><div id="load-fill"></div></div>
    <div id="load-time"></div>
</div>

<div id="map"></div>

<script>
    // ─────────────────────────────────────────────────────────────
    // !! HIER deine Vercel-URL eintragen nach dem Deploy !!
    // Beispiel: "https://hh-crowd-proxy-xyz.vercel.app/api/crowd"
    // ─────────────────────────────────────────────────────────────
    const PROXY_URL = "DEINE_VERCEL_URL_HIER/api/crowd";

    mapboxgl.accessToken = 'pk.eyJ1IjoiYXBpdHphbCIsImEiOiJjbWNodHF3c3UwOG1oMmpwZDF2bmo0NGNwIn0.xsE9Ofauj-ejubSkhN0gsg';

    // Demo-Fallback falls Proxy noch nicht eingetragen
    const DEMO_SENSORS = [
        { name: "Spitalerstraße",         coord: [10.0027, 53.5504], val: 2800 },
        { name: "Mönckebergstraße",       coord: [10.0003, 53.5501], val: 3200 },
        { name: "Jungfernstieg West",     coord: [9.9940,  53.5534], val: 1900 },
        { name: "Jungfernstieg Ost",      coord: [9.9990,  53.5528], val: 2100 },
        { name: "Rathausmarkt Nord",      coord: [9.9930,  53.5508], val: 1400 },
        { name: "Rathausmarkt Süd",       coord: [9.9935,  53.5498], val: 1100 },
        { name: "Alsterarkaden",          coord: [9.9920,  53.5500], val: 850  },
        { name: "Neuer Wall",             coord: [9.9900,  53.5490], val: 650  },
        { name: "Gänsemarkt",             coord: [9.9878,  53.5508], val: 700  },
        { name: "Poststraße",             coord: [9.9975,  53.5512], val: 1600 },
        { name: "Steinstraße",            coord: [10.0048, 53.5498], val: 500  },
        { name: "Große Bleichen",         coord: [9.9897,  53.5500], val: 780  },
        { name: "Europa Passage",         coord: [10.0008, 53.5520], val: 2400 },
        { name: "Hauptbahnhof Süd",       coord: [10.0066, 53.5530], val: 3600 },
        { name: "Hauptbahnhof Nord",      coord: [10.0066, 53.5545], val: 2900 },
        { name: "Binnenalster Promenade", coord: [9.9966,  53.5560], val: 550  },
    ];

    // Innenstadt-Grenzen: nur der Bereich mit echten Sensoren
    const BOUNDS = [
        [9.955, 53.540],  // Südwest (Neustadt/Hafenkante)
        [10.025, 53.565]  // Nordost (Hauptbahnhof/Alster)
    ];

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [9.9960, 53.5510],
        zoom: 15, pitch: 55, bearing: -10, antialias: true,
        maxBounds: [
            [9.940, 53.530],  // etwas größer als BOUNDS für weichen Rand
            [10.040, 53.575]
        ],
        minZoom: 13,
        maxZoom: 18
    });

    // Karte beim Start auf Innenstadt fitten
    map.fitBounds(BOUNDS, { padding: 40, pitch: 55, bearing: -10 });

    const geocoder = new MapboxGeocoder({
        accessToken: mapboxgl.accessToken, mapboxgl,
        placeholder: 'Ort in der Innenstadt suchen…',
        bbox: [9.940, 53.530, 10.040, 53.575],
        proximity: { longitude: 9.996, latitude: 53.551 },
        language: 'de'
    });
    document.getElementById('geocoder').appendChild(geocoder.onAdd(map));

    function setStatus(type, msg) {
        document.getElementById('status-dot').className = type;
        document.getElementById('status-text').textContent = msg;
    }

    map.on('load', () => {
        map.addLayer({
            id: '3d-buildings', source: 'composite', 'source-layer': 'building', type: 'fill-extrusion',
            paint: { 'fill-extrusion-color': '#1a1a2e', 'fill-extrusion-height': ['get', 'height'], 'fill-extrusion-opacity': 0.6 }
        });

        map.addSource('crowd-src', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

        map.addLayer({
            id: 'crowd-bars', type: 'fill-extrusion', source: 'crowd-src',
            paint: {
                'fill-extrusion-color': ['interpolate', ['linear'], ['get', 'count'],
                    0, '#00d2ff', 400, '#33cc33', 800, '#ff9800', 1500, '#ff4b2b', 3000, '#cc44ff'
                ],
                'fill-extrusion-height': ['get', 'h'],
                'fill-extrusion-opacity': 0.88,
                'fill-extrusion-vertical-gradient': true
            }
        });

        map.on('click', 'crowd-bars', (e) => {
            if (!e.features.length) return;
            const { count, name, time } = e.features[0].properties;
            const pct = Math.min(100, (count / 4000) * 100);
            const color = count < 400 ? '#00d2ff' : count < 800 ? '#33cc33' : count < 1500 ? '#ff9800' : count < 3000 ? '#ff4b2b' : '#cc44ff';
            document.getElementById('place-name').textContent = name || 'Unbekannt';
            document.getElementById('load-value').textContent = count.toLocaleString('de-DE');
            document.getElementById('load-value').style.color = color;
            document.getElementById('load-fill').style.cssText = `width:${pct}%; background:${color}`;
            document.getElementById('load-time').textContent = time ? 'Messung: ' + new Date(time).toLocaleString('de-DE') : '';
            document.getElementById('info-panel').style.display = 'block';
        });
        map.on('mouseenter', 'crowd-bars', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'crowd-bars', () => map.getCanvas().style.cursor = '');

        loadData();
        setInterval(loadData, 300000);
    });

    function buildFeatures(list) {
        return list.map(({ coord, val, name, time }) => {
            const s = 0.00022;
            return {
                type: 'Feature',
                properties: { count: val, h: Math.max(25, val / 2.5), name, time: time || null },
                geometry: { type: 'Polygon', coordinates: [[[coord[0]-s,coord[1]-s],[coord[0]+s,coord[1]-s],[coord[0]+s,coord[1]+s],[coord[0]-s,coord[1]+s],[coord[0]-s,coord[1]-s]]] }
            };
        });
    }

    async function loadData() {
        // Proxy noch nicht gesetzt → Demo-Modus
        if (PROXY_URL.startsWith("DEINE")) {
            useDemoData("Proxy-URL nicht gesetzt – Demo-Modus");
            return;
        }

        setStatus('', 'Lade Live-Daten…');
        try {
            const res = await fetch(PROXY_URL, { signal: AbortSignal.timeout(10000) });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            if (json.error) throw new Error(json.error);

            const valid = (json.value || []).filter(s => s.Locations?.[0] && s.Datastreams?.[0]?.Observations?.[0]);
            if (valid.length === 0) throw new Error("Keine Sensordaten");

            const features = buildFeatures(valid.map(s => ({
                coord: s.Locations[0].location.coordinates,
                val:   s.Datastreams[0].Observations[0].result,
                name:  s.name,
                time:  s.Datastreams[0].Observations[0].phenomenonTime
            })));
            map.getSource('crowd-src').setData({ type: 'FeatureCollection', features });
            setStatus('live', `Live · ${valid.length} Sensoren · ${new Date().toLocaleTimeString('de-DE')}`);

        } catch (err) {
            console.error("API-Fehler:", err.message);
            useDemoData("API nicht erreichbar – Demo-Modus");
        }
    }

    function useDemoData(msg) {
        const noisy = DEMO_SENSORS.map(s => ({ ...s, val: Math.max(50, s.val + Math.round((Math.random()-0.5)*s.val*0.15)) }));
        map.getSource('crowd-src').setData({ type: 'FeatureCollection', features: buildFeatures(noisy) });
        setStatus('demo', msg);
    }
</script>
</body>
</html>
