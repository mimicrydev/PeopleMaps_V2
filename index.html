<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>HH Crowd Live Radar</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" type="text/css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .overlay {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(8,8,16,0.92); color: white; padding: 16px;
            border-radius: 14px; border: 1px solid rgba(255,255,255,0.1);
            width: 290px; backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .overlay h3 { margin: 0 0 4px 0; font-size: 16px; letter-spacing: 0.5px; color: #e0e8ff; }
        .overlay .subtitle { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
        #status-bar { display: flex; align-items: center; gap: 6px; font-size: 11px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08); }
        #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4b2b; flex-shrink: 0; transition: background 0.5s; }
        #status-dot.live { background: #33cc33; animation: blink 2s infinite; }
        #status-dot.demo { background: #ff9800; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #status-text { color: rgba(255,255,255,0.5); font-size: 11px; }
        .view-toggle { display: flex; gap: 6px; margin-top: 10px; }
        .view-toggle button { flex: 1; padding: 5px 0; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; background: transparent; color: rgba(255,255,255,0.4); font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .view-toggle button.active { background: rgba(255,255,255,0.12); color: white; border-color: rgba(255,255,255,0.3); }
        .legend { position: absolute; bottom: 30px; right: 15px; z-index: 10; background: rgba(8,8,16,0.88); color: white; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); font-size: 11px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); min-width: 170px; }
        .legend-title { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .legend-gradient { height: 10px; border-radius: 5px; width: 100%; background: linear-gradient(to right, #0033ff, #00d2ff, #33cc33, #ff9800, #ff4b2b, #cc44ff); margin-bottom: 5px; }
        .legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: rgba(255,255,255,0.4); }

        /* ── Info Panel (erweitert mit Forecast) ── */
        #info-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(8,8,16,0.97); color: white; padding: 20px;
            border-radius: 16px; width: 320px; display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
        }
        #info-panel .close-btn { position: absolute; top: 10px; right: 14px; cursor: pointer; color: rgba(255,255,255,0.35); font-size: 20px; line-height: 1; }
        #info-panel .close-btn:hover { color: white; }
        #place-name { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 2px; }
        #load-value { font-size: 38px; font-weight: 700; margin: 2px 0 0 0; line-height: 1; }
        #load-label { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 10px; }
        .bar-track { height: 5px; width: 100%; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
        #load-fill { height: 100%; width: 0%; border-radius: 3px; transition: width 1.2s ease, background 1.2s ease; }
        #load-time { font-size: 10px; color: rgba(255,255,255,0.25); margin-bottom: 16px; }

        /* Trennlinie Forecast */
        .forecast-divider {
            border: none; border-top: 1px solid rgba(255,255,255,0.08);
            margin: 0 0 12px 0;
        }
        .forecast-title {
            font-size: 10px; color: rgba(255,255,255,0.35);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
        }

        /* Forecast Chart */
        .forecast-chart {
            display: flex; align-items: flex-end; gap: 4px;
            height: 60px; margin-bottom: 6px;
        }
        .fc-bar-wrap {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; gap: 3px;
        }
        .fc-bar {
            width: 100%; border-radius: 4px 4px 0 0;
            transition: height 0.8s ease;
            min-height: 4px;
            position: relative;
        }
        .fc-bar.now { outline: 2px solid rgba(255,255,255,0.4); outline-offset: 1px; }
        .fc-label { font-size: 9px; color: rgba(255,255,255,0.35); white-space: nowrap; }
        .fc-val { font-size: 9px; color: rgba(255,255,255,0.5); }

        /* Trend-Pfeil */
        .forecast-trend {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        .trend-arrow { font-size: 14px; }

        .mapboxgl-ctrl-geocoder { width: 100% !important; max-width: none !important; background: rgba(255,255,255,0.06) !important; box-shadow: none !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 8px !important; }
        .mapboxgl-ctrl-geocoder input { color: white !important; background: transparent !important; }
        .mapboxgl-ctrl-geocoder--icon { fill: rgba(255,255,255,0.3) !important; }
        .mapboxgl-ctrl-geocoder--input::placeholder { color: rgba(255,255,255,0.3) !important; }
    </style>
</head>
<body>

<div class="overlay">
    <h3>🌡️ Hamburg Crowd Radar</h3>
    <div class="subtitle">Passanten-Frequenz in Echtzeit</div>
    <div id="geocoder"></div>
    <div class="view-toggle">
        <button id="btn-heat" class="active" onclick="setView('heat')">🔥 Heatmap</button>
        <button id="btn-3d" onclick="setView('3d')">📊 3D-Säulen</button>
    </div>
    <div id="status-bar">
        <div id="status-dot"></div>
        <span id="status-text">Verbinde…</span>
    </div>
</div>

<div class="legend">
    <div class="legend-title">Passanten / Stunde</div>
    <div class="legend-gradient"></div>
    <div class="legend-labels"><span>Ruhig</span><span>Moderat</span><span>Sehr voll</span></div>
</div>

<div id="info-panel">
    <span class="close-btn" onclick="document.getElementById('info-panel').style.display='none'">×</span>
    <div id="place-name">Standort</div>
    <div id="load-value" style="color:#00d2ff">–</div>
    <div id="load-label">Passanten jetzt</div>
    <div class="bar-track"><div id="load-fill"></div></div>
    <div id="load-time"></div>

    <hr class="forecast-divider">
    <div class="forecast-title">📈 Forecast nächste 3 Stunden</div>
    <div class="forecast-chart" id="forecast-chart"></div>
    <div class="forecast-trend" id="forecast-trend"></div>
</div>

<div id="map"></div>

<script>
    const PROXY_URL = "DEINE_VERCEL_URL_HIER/api/crowd";

    mapboxgl.accessToken = 'pk.eyJ1IjoiYXBpdHphbCIsImEiOiJjbWNodHF3c3UwOG1oMmpwZDF2bmo0NGNwIn0.xsE9Ofauj-ejubSkhN0gsg';

    const DEMO_SENSORS = [
        { name: "Spitalerstraße",         coord: [10.0027, 53.5504], val: 2800 },
        { name: "Mönckebergstraße",       coord: [10.0003, 53.5501], val: 3200 },
        { name: "Jungfernstieg West",     coord: [9.9940,  53.5534], val: 1900 },
        { name: "Jungfernstieg Ost",      coord: [9.9990,  53.5528], val: 2100 },
        { name: "Rathausmarkt Nord",      coord: [9.9930,  53.5508], val: 1400 },
        { name: "Rathausmarkt Süd",       coord: [9.9935,  53.5498], val: 1100 },
        { name: "Alsterarkaden",          coord: [9.9920,  53.5500], val: 850  },
        { name: "Neuer Wall",             coord: [9.9900,  53.5490], val: 650  },
        { name: "Gänsemarkt",             coord: [9.9878,  53.5508], val: 700  },
        { name: "Poststraße",             coord: [9.9975,  53.5512], val: 1600 },
        { name: "Steinstraße",            coord: [10.0048, 53.5498], val: 500  },
        { name: "Große Bleichen",         coord: [9.9897,  53.5500], val: 780  },
        { name: "Europa Passage",         coord: [10.0008, 53.5520], val: 2400 },
        { name: "Hauptbahnhof Süd",       coord: [10.0066, 53.5530], val: 3600 },
        { name: "Hauptbahnhof Nord",      coord: [10.0066, 53.5545], val: 2900 },
        { name: "Binnenalster Promenade", coord: [9.9966,  53.5560], val: 550  },
    ];

    const BOUNDS = [[9.955, 53.540],[10.025, 53.565]];
    let currentView = 'heat';
    let animFrame = null;
    let pulseT = 0;

    // ── Crowd-Forecast Logik ────────────────────────────────────────
    // Typische Tagesgangkurve für Hamburger Innenstadt (Faktor 0–1)
    // Index = Stunde 0–23
    const HOUR_CURVE = [
        0.05, 0.03, 0.02, 0.02, 0.03, 0.05,  // 0–5 Uhr: Nacht
        0.10, 0.20, 0.35, 0.50, 0.65, 0.80,  // 6–11 Uhr: Morgen
        0.90, 0.95, 0.92, 0.88, 0.85, 0.80,  // 12–17 Uhr: Mittag/Nachmittag
        0.70, 0.60, 0.45, 0.30, 0.18, 0.09   // 18–23 Uhr: Abend
    ];

    // Wochentag-Multiplikator (0=So, 1=Mo, ... 6=Sa)
    const DAY_FACTOR = [0.60, 0.75, 0.80, 0.82, 0.85, 1.00, 0.90];

    function forecastValue(currentVal, hoursAhead) {
        const now = new Date();
        const targetHour = (now.getHours() + hoursAhead) % 24;
        const currentHour = now.getHours();
        const dayFactor = DAY_FACTOR[now.getDay()];

        // Peak-Wert aus aktuellem Wert + Tagesgangkurve ableiten
        const currentCurve = HOUR_CURVE[currentHour];
        const peakEstimate = currentCurve > 0.05 ? currentVal / currentCurve : currentVal * 2;
        const forecasted = peakEstimate * HOUR_CURVE[targetHour] * dayFactor;

        // Leichte zufällige Variation ±8% für Realismus
        const jitter = 1 + (Math.random() - 0.5) * 0.16;
        return Math.round(forecasted * jitter);
    }

    function crowdColor(val) {
        if (val < 400)  return '#00d2ff';
        if (val < 800)  return '#33cc33';
        if (val < 1500) return '#ff9800';
        if (val < 3000) return '#ff4b2b';
        return '#cc44ff';
    }

    function renderForecast(currentVal) {
        const now = new Date();
        const chart = document.getElementById('forecast-chart');
        const trendEl = document.getElementById('forecast-trend');

        // Zeitpunkte: jetzt, +1h, +2h, +3h
        const points = [0, 1, 2, 3].map(h => {
            const val = h === 0 ? currentVal : forecastValue(currentVal, h);
            const hour = (now.getHours() + h) % 24;
            const label = h === 0 ? 'Jetzt' : `+${h}h`;
            const timeStr = `${String(hour).padStart(2,'0')}:00`;
            return { val, label, timeStr, isNow: h === 0 };
        });

        const maxVal = Math.max(...points.map(p => p.val), 500);

        chart.innerHTML = points.map(p => {
            const heightPct = Math.max(6, (p.val / maxVal) * 100);
            const color = crowdColor(p.val);
            return `
                <div class="fc-bar-wrap">
                    <div class="fc-val">${p.val >= 1000 ? (p.val/1000).toFixed(1)+'k' : p.val}</div>
                    <div class="fc-bar ${p.isNow ? 'now' : ''}"
                         style="height:${heightPct}%; background:${color}; opacity:${p.isNow ? 1 : 0.65};">
                    </div>
                    <div class="fc-label">${p.label}</div>
                    <div class="fc-label" style="opacity:0.5">${p.timeStr}</div>
                </div>`;
        }).join('');

        // Trend berechnen
        const val1h = points[1].val;
        const diff = val1h - currentVal;
        const pct = Math.round((diff / Math.max(currentVal, 1)) * 100);
        let arrow, trendText, trendColor;

        if (pct > 10) {
            arrow = '↑'; trendText = `In 1h ca. +${pct}% voller`; trendColor = '#ff9800';
        } else if (pct < -10) {
            arrow = '↓'; trendText = `In 1h ca. ${pct}% ruhiger`; trendColor = '#33cc33';
        } else {
            arrow = '→'; trendText = 'Auslastung bleibt ähnlich'; trendColor = '#aaa';
        }

        trendEl.innerHTML = `<span class="trend-arrow" style="color:${trendColor}">${arrow}</span>
                             <span style="color:${trendColor}">${trendText}</span>`;
    }

    // ── Karte ───────────────────────────────────────────────────────
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [9.9960, 53.5510],
        zoom: 15, pitch: 0, bearing: 0, antialias: true,
        maxBounds: [[9.940, 53.530],[10.040, 53.575]],
        minZoom: 13, maxZoom: 18
    });

    map.fitBounds(BOUNDS, { padding: 40, pitch: 0, bearing: 0 });

    const geocoder = new MapboxGeocoder({
        accessToken: mapboxgl.accessToken, mapboxgl,
        placeholder: 'Ort in der Innenstadt suchen…',
        bbox: [9.940, 53.530, 10.040, 53.575],
        proximity: { longitude: 9.996, latitude: 53.551 },
        language: 'de'
    });
    document.getElementById('geocoder').appendChild(geocoder.onAdd(map));

    function setStatus(type, msg) {
        document.getElementById('status-dot').className = type;
        document.getElementById('status-text').textContent = msg;
    }

    function animateHeatmap() {
        pulseT += 0.012;
        // Nur Radius der Punkte atmet sanft — keine Opacity/Farbänderung
        const rf = 1 + Math.sin(pulseT) * 0.08;
        if (map.getLayer('crowd-dots')) {
            map.setPaintProperty('crowd-dots', 'circle-radius', [
                'interpolate', ['linear'], ['get', 'count'],
                0,    4  * rf,
                4000, 12 * rf
            ]);
        }
        animFrame = requestAnimationFrame(animateHeatmap);
    }

    function setView(mode) {
        currentView = mode;
        document.getElementById('btn-heat').classList.toggle('active', mode === 'heat');
        document.getElementById('btn-3d').classList.toggle('active', mode === '3d');
        if (mode === 'heat') {
            if (map.getLayer('crowd-bars')) map.setLayoutProperty('crowd-bars', 'visibility', 'none');
            if (map.getLayer('crowd-heat')) map.setLayoutProperty('crowd-heat', 'visibility', 'visible');
            if (map.getLayer('crowd-dots')) map.setLayoutProperty('crowd-dots', 'visibility', 'visible');
            map.easeTo({ pitch: 0, bearing: 0, duration: 800 });
            if (!animFrame) animateHeatmap();
        } else {
            if (map.getLayer('crowd-heat')) map.setLayoutProperty('crowd-heat', 'visibility', 'none');
            if (map.getLayer('crowd-dots')) map.setLayoutProperty('crowd-dots', 'visibility', 'none');
            if (map.getLayer('crowd-bars')) map.setLayoutProperty('crowd-bars', 'visibility', 'visible');
            map.easeTo({ pitch: 55, bearing: -10, duration: 800 });
            if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
        }
    }

    map.on('load', () => {
        map.addLayer({
            id: '3d-buildings', source: 'composite', 'source-layer': 'building', type: 'fill-extrusion',
            paint: { 'fill-extrusion-color': '#1a1a2e', 'fill-extrusion-height': ['get', 'height'], 'fill-extrusion-opacity': 0.7 }
        });

        map.addSource('crowd-points', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
        map.addSource('crowd-src',    { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

        map.addLayer({
            id: 'crowd-heat', type: 'heatmap', source: 'crowd-points',
            paint: {
                'heatmap-weight':     ['interpolate', ['linear'], ['get', 'count'], 0, 0, 4000, 1],
                'heatmap-intensity':  ['interpolate', ['linear'], ['zoom'], 13, 1.2, 16, 2.5],
                'heatmap-color': [
                    'interpolate', ['linear'], ['heatmap-density'],
                    0,    'rgba(0,0,60,0)',
                    0.05, 'rgba(0,40,180,0.5)',
                    0.2,  'rgba(0,180,255,0.75)',
                    0.4,  'rgba(51,204,51,0.85)',
                    0.6,  'rgba(255,152,0,0.9)',
                    0.8,  'rgba(255,60,30,0.95)',
                    1.0,  'rgba(180,0,255,1)'
                ],
                'heatmap-radius': ['interpolate', ['linear'], ['zoom'],
                    13, ['get', 'baseRadius'],
                    16, ['*', ['get', 'baseRadius'], 2.2]
                ],
                'heatmap-opacity': 0.75
            }
        });

        map.addLayer({
            id: 'crowd-dots', type: 'circle', source: 'crowd-points',
            paint: {
                'circle-radius': ['interpolate', ['linear'], ['get', 'count'], 0, 4, 4000, 12],
                'circle-color':  ['interpolate', ['linear'], ['get', 'count'],
                    0, '#0055ff', 400, '#00d2ff', 800, '#33cc33',
                    1500, '#ff9800', 3000, '#ff4b2b', 4000, '#cc44ff'
                ],
                'circle-opacity': 0.9, 'circle-blur': 0.25,
                'circle-stroke-width': 1.5, 'circle-stroke-color': 'rgba(255,255,255,0.3)'
            }
        });

        map.addLayer({
            id: 'crowd-bars', type: 'fill-extrusion', source: 'crowd-src',
            layout: { visibility: 'none' },
            paint: {
                'fill-extrusion-color': ['interpolate', ['linear'], ['get', 'count'],
                    0, '#00d2ff', 400, '#33cc33', 800, '#ff9800', 1500, '#ff4b2b', 3000, '#cc44ff'
                ],
                'fill-extrusion-height': ['get', 'h'],
                'fill-extrusion-opacity': 0.88,
                'fill-extrusion-vertical-gradient': true
            }
        });

        ['crowd-dots', 'crowd-bars'].forEach(layerId => {
            map.on('click', layerId, (e) => {
                if (!e.features.length) return;
                const { count, name, time } = e.features[0].properties;
                const val = Number(count);
                const pct = Math.min(100, (val / 4000) * 100);
                const color = crowdColor(val);

                document.getElementById('place-name').textContent = name || 'Unbekannt';
                document.getElementById('load-value').textContent = val.toLocaleString('de-DE');
                document.getElementById('load-value').style.color = color;
                document.getElementById('load-fill').style.cssText = `width:${pct}%; background:${color}`;
                document.getElementById('load-time').textContent = time
                    ? 'Gemessen: ' + new Date(time).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}) + ' Uhr'
                    : '';

                renderForecast(val);
                document.getElementById('info-panel').style.display = 'block';
            });
            map.on('mouseenter', layerId, () => map.getCanvas().style.cursor = 'pointer');
            map.on('mouseleave', layerId, () => map.getCanvas().style.cursor = '');
        });

        animateHeatmap();
        loadData();
        setInterval(loadData, 300000);
    });

    function buildPointFeatures(list) {
        return list.map(({ coord, val, name, time }) => ({
            type: 'Feature',
            properties: { count: val, name, time: time || null, baseRadius: Math.max(35, Math.min(130, val / 22)) },
            geometry: { type: 'Point', coordinates: coord }
        }));
    }

    function buildBarFeatures(list) {
        return list.map(({ coord, val, name, time }) => {
            const s = 0.00022;
            return {
                type: 'Feature',
                properties: { count: val, h: Math.max(25, val / 2.5), name, time: time || null },
                geometry: { type: 'Polygon', coordinates: [[[coord[0]-s,coord[1]-s],[coord[0]+s,coord[1]-s],[coord[0]+s,coord[1]+s],[coord[0]-s,coord[1]+s],[coord[0]-s,coord[1]-s]]] }
            };
        });
    }

    function applyData(list) {
        map.getSource('crowd-points').setData({ type: 'FeatureCollection', features: buildPointFeatures(list) });
        map.getSource('crowd-src').setData({ type: 'FeatureCollection', features: buildBarFeatures(list) });
    }

    async function loadData() {
        if (PROXY_URL.startsWith("DEINE")) { useDemoData("Demo-Modus"); return; }
        setStatus('', 'Lade Live-Daten…');
        try {
            const res = await fetch(PROXY_URL, { signal: AbortSignal.timeout(10000) });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            if (json.error) throw new Error(json.error);
            const valid = (json.value || []).filter(s => s.Locations?.[0] && s.Datastreams?.[0]?.Observations?.[0]);
            if (valid.length === 0) throw new Error("Keine Sensordaten");
            applyData(valid.map(s => ({
                coord: s.Locations[0].location.coordinates,
                val:   s.Datastreams[0].Observations[0].result,
                name:  s.name,
                time:  s.Datastreams[0].Observations[0].phenomenonTime
            })));
            setStatus('live', `Live · ${valid.length} Sensoren · ${new Date().toLocaleTimeString('de-DE')}`);
        } catch (err) {
            console.error("API-Fehler:", err.message);
            useDemoData("API nicht erreichbar – Demo-Modus");
        }
    }

    function useDemoData(msg) {
        const noisy = DEMO_SENSORS.map(s => ({ ...s, val: Math.max(50, s.val + Math.round((Math.random()-0.5)*s.val*0.15)) }));
        applyData(noisy);
        setStatus('demo', msg);
    }
</script>
</body>
</html>
